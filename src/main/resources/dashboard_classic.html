<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Bell Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --accent-red: #ef4444;
            --accent-purple: #6d28d9;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --header-height: 120px;
            --footer-height: 70px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* HEADER */
        header {
            height: var(--header-height);
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(15px);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 40px;
            border-bottom: 3px solid rgba(255, 255, 255, 0.08);
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-logo-svg {
            height: 75px;
            width: auto;
            stroke: white;
            fill: none;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        .school-info h1 {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: white;
            line-height: 1.1;
        }

        .school-info .city-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dim);
            margin-top: 2px;
        }

        .header-center {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .main-clock {
            font-size: 85px;
            font-weight: 700;
            color: white;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .clock-divider {
            width: 3px;
            height: 60px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .date-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .date-text {
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .day-text {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: capitalize;
        }

        .header-right {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 20px;
        }

        .bell-icon-svg {
            height: 80px;
            width: auto;
            fill: none;
            stroke: var(--accent-yellow);
            stroke-width: 1.2px;
            filter: drop-shadow(0 0 15px rgba(245, 158, 11, 0.3));
        }

        .countdown-block {
            display: flex;
            flex-direction: column;
        }

        .countdown-label {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .countdown-time {
            font-size: 42px;
            font-weight: 800;
            color: var(--accent-yellow);
            line-height: 1;
        }

        /* MAIN CONTENT */
        main {
            flex: 1;
            padding: 25px 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow: hidden;
        }

        /* SCHEDULE TABLE */
        .table-container {
            flex: 1;
            background: var(--card-bg);
            border-radius: 28px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px -10px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 22px;
            table-layout: fixed;
        }

        thead {
            background: rgba(15, 23, 42, 0.6);
        }

        th {
            padding: 15px 30px;
            text-align: left;
            text-transform: uppercase;
            font-size: 16px;
            letter-spacing: 2px;
            color: var(--text-dim);
            font-weight: 800;
        }

        td {
            padding: 0 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            vertical-align: middle;
            height: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        tr {
            height: 80px;
        }

        tr.status-replacement { border-left: 8px solid var(--accent-red); background: rgba(239, 68, 68, 0.04); }
        tr.status-current { border-left: 8px solid var(--accent-blue); background: rgba(59, 130, 246, 0.04); }
        tr.status-upcoming { border-left: 8px solid var(--accent-yellow); background: rgba(245, 158, 11, 0.04); }

        .teacher-cell-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            height: 100%;
        }

        .teacher-icon-svg {
            width: 28px;
            height: 28px;
            fill: white;
            opacity: 0.9;
            flex-shrink: 0;
        }

        .teacher-replacement {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap; /* Allow wrapping if very long */
        }

        .teacher-replacement .original {
            text-decoration: line-through;
            color: var(--text-dim);
            font-size: 16px;
            opacity: 0.7;
        }

        .teacher-replacement .arrow {
            color: var(--accent-red);
            font-weight: 900;
            font-size: 20px;
        }

        .teacher-replacement .new {
            color: var(--accent-red);
            font-weight: 800;
            font-size: 22px;
        }

        /* STATUS BADGE */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 6px 14px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .status-badge svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .status-badge.normal { background: rgba(16, 185, 129, 0.15); color: var(--accent-green); border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-badge.current { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); border: 1px solid rgba(59, 130, 246, 0.3); }
        .status-badge.upcoming { background: rgba(245, 158, 11, 0.15); color: var(--accent-yellow); border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-badge.replacement { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); border: 1px solid rgba(239, 68, 68, 0.3); }

        /* FOOTER */
        footer {
            min-height: var(--footer-height);
            height: auto;
            background: linear-gradient(90deg, var(--accent-purple) 0%, #4c1d95 100%);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 25px 20px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        .announcement {
            color: white;
            font-weight: 700;
            font-size: 20px;
            display: flex;
            align-items: center;
            gap: 18px;
            max-width: 80%;
            height: 60px; /* Increased from 40px to prevent clipping */
            padding: 5px 0; /* Extra safety padding */
            overflow: hidden;
        }

        #announcement-text {
            white-space: normal;
            line-height: 1.2;
            transition: opacity 0.5s ease-in-out;
            opacity: 1;
            padding: 2px 0;
        }

        #announcement-text.fade-out {
            opacity: 0;
        }

        .megaphone-svg {
            width: 36px;
            height: 36px;
            fill: none;
            stroke: white;
            stroke-width: 2.5;
            flex-shrink: 0;
        }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(15, 23, 42, 0.4);
            transition: all 0.3s ease;
        }

        .connection-status.online {
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .connection-status.offline {
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.4);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 10px currentColor;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .row-fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        /* EMERGENCY OVERLAY */
        #emergency-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: pulse-bg 2s infinite;
        }

        #emergency-overlay.air-raid {
            background-color: rgba(239, 68, 68, 0.95);
        }

        #emergency-overlay.emergency {
            background-color: rgba(245, 158, 11, 0.95);
        }

        #emergency-overlay.silence {
            background-color: rgba(15, 23, 42, 0.98);
            animation: solemn-pulse 5s ease-in-out infinite;
        }

        @keyframes pulse-bg {
            0% { opacity: 0.9; }
            50% { opacity: 1; }
            100% { opacity: 0.9; }
        }

        @keyframes solemn-pulse {
            0% { background-color: rgba(15, 23, 42, 0.98); }
            50% { background-color: rgba(30, 41, 59, 0.98); }
            100% { background-color: rgba(15, 23, 42, 0.98); }
        }

        .em-content {
            padding: 60px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 4px solid rgba(255, 255, 255, 0.3);
            max-width: 80%;
        }

        #em-icon {
            font-size: 150px;
            margin-bottom: 30px;
            display: block;
        }

        #em-title {
            font-size: 80px;
            font-weight: 900;
            color: white;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #em-desc {
            font-size: 40px;
            font-weight: 700;
            color: white;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <svg class="header-logo-svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 22v-4a2 2 0 1 0-4 0v4"/>
                <path d="m18 10 4 2v8a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-8l4-2"/>
                <path d="M18 5v3"/>
                <path d="m4 12 8-4 8 4"/>
                <path d="M6 5v3"/>
                <circle cx="12" cy="9" r="2"/>
                <path d="M16 22V2h-8v20"/>
                <path d="M16 2h4v3h-4"/>
            </svg>
            <div class="school-info">
                <h1 id="school-name">Школа</h1>
                <div class="city-name" id="city-name">Місто</div>
            </div>
        </div>
        
        <div class="header-center">
            <div class="main-clock" id="clock">00:00</div>
            <div class="clock-divider"></div>
            <div class="date-block">
                <div class="date-text" id="header-date">-- --- ----</div>
                <div class="day-text" id="header-day">понеділок</div>
            </div>
        </div>

        <div class="header-right">
            <svg class="bell-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
            <div class="countdown-block">
                <div class="countdown-label">До дзвінка</div>
                <div class="countdown-time" id="countdown-text">-- хв</div>
            </div>
        </div>
    </header>

    <main>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 10%">Клас</th>
                        <th style="width: 10%">Урок</th>
                        <th style="width: 25%">Предмет</th>
                        <th style="width: 30%">Вчитель</th>
                        <th style="width: 10%">Каб.</th>
                        <th style="width: 15%">Статус</th>
                    </tr>
                </thead>
                <tbody id="schedule-body"></tbody>
            </table>
        </div>
    </main>

    <footer>
        <div class="announcement" id="announcement">
            <svg class="megaphone-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>
            <div id="announcement-text">Вітаємо у системі School Bell!</div>
        </div>
        <div class="connection-status offline" id="conn-status">
            <div class="status-dot"></div>
            <span>Офлайн</span>
        </div>
    </footer>

    <div id="emergency-overlay">
        <div class="em-content">
            <span id="em-icon">📢</span>
            <h1 id="em-title">УВАГА</h1>
            <p id="em-desc">Дотримуйтесь інструкцій</p>
        </div>
    </div>

    <script>
        let socket;
        let currentPage = 0;
        let allRows = [];
        let paginationTimeout = null;

        let announcements = [];
        let announcementIndex = 0;
        let announcementTimer = null;

        const SVG_USER = '<svg class="teacher-icon-svg" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>';
        const SVG_CHECK = '<svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
        const SVG_CLOCK = '<svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg>';
        const SVG_ALERT = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.47 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>';

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('header-date').textContent = now.toLocaleDateString('uk-UA', { day: 'numeric', month: 'long', year: 'numeric' });
            document.getElementById('header-day').textContent = now.toLocaleDateString('uk-UA', { weekday: 'long' });
        }

        // --- Screen Wake Lock implementation ---
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock active');
                }
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });
        requestWakeLock();
        // ----------------------------------------

        setInterval(updateClock, 1000);
        updateClock();

        function connectWS() {
            const currentPort = parseInt(window.location.port) || 80;
            const wsPort = currentPort + 2;
            const wsUrl = `ws://${window.location.hostname}:${wsPort}`;
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                const status = document.getElementById('conn-status');
                status.classList.replace('offline', 'online');
                status.querySelector('span').textContent = 'Онлайн';
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleUpdate(data);
            };

            socket.onclose = () => {
                const status = document.getElementById('conn-status');
                status.classList.replace('online', 'offline');
                status.querySelector('span').textContent = 'Офлайн';
                setTimeout(connectWS, 5000);
            };
        }

        function handleUpdate(data) {
            if (data.schoolName) document.getElementById('school-name').textContent = data.schoolName;
            if (data.cityName) document.getElementById('city-name').textContent = data.cityName;
            
            if (data.announcement !== undefined) {
                const raw = data.announcement || "Вітаємо у системі School Bell!";
                const newAnnouncements = raw.split('|||').filter(s => s.trim().length > 0);
                if (JSON.stringify(newAnnouncements) !== JSON.stringify(announcements)) {
                    announcements = newAnnouncements;
                    announcementIndex = 0;
                    startAnnouncementRotation();
                }
            }
            
            const overlay = document.getElementById('emergency-overlay');
            if (data.alertType === 'AIR_RAID') {
                overlay.className = 'air-raid';
                overlay.style.display = 'flex';
                document.getElementById('em-icon').textContent = '📢';
                document.getElementById('em-title').textContent = 'ПОВІТРЯНА ТРИВОГА';
                document.getElementById('em-desc').textContent = 'УСІМ В УКРИТТЯ!';
            } else if (data.alertType === 'EMERGENCY') {
                overlay.className = 'emergency';
                overlay.style.display = 'flex';
                document.getElementById('em-icon').textContent = '⚠️';
                document.getElementById('em-title').textContent = 'НАДЗВИЧАЙНА СИТУАЦІЯ';
                document.getElementById('em-desc').textContent = 'ДІЙТЕ ЗГІДНО ІНСТРУКЦІЇ';
            } else if (data.alertType === 'SILENCE') {
                overlay.className = 'silence';
                overlay.style.display = 'flex';
                document.getElementById('em-icon').textContent = '🕯️';
                document.getElementById('em-title').textContent = 'ХВИЛИНА МОВЧАННЯ';
                document.getElementById('em-desc').textContent = 'ВШАНУЙМО ПАМ’ЯТЬ ЗАГИБЛИХ ГЕРОЇВ';
            } else {
                overlay.className = '';
                overlay.style.display = 'none';
            }

            if (data.schoolStatus) {
                const s = data.schoolStatus;
                const label = document.querySelector('.countdown-label');
                if (s.type === 'BREAK' || s.type === 'BEFORE') {
                    label.textContent = 'До уроку';
                } else {
                    label.textContent = 'До дзвінка';
                }
            }

            if (data.rows) {
                const newData = JSON.stringify(data.rows);
                if (window.lastRowsData !== newData) {
                    window.lastRowsData = newData;
                    allRows = data.rows;
                    renderTable();
                }
            }

            if (data.countdown) {
                const parts = data.countdown.split(':');
                const mins = parseInt(parts[0]) * 60 + parseInt(parts[1]);
                document.getElementById('countdown-text').textContent = `${mins} хв`;
            }
        }

        function startAnnouncementRotation() {
            if (announcementTimer) clearInterval(announcementTimer);
            showNextAnnouncement();
            if (announcements.length > 1) {
                announcementTimer = setInterval(showNextAnnouncement, 8000);
            }
        }

        function showNextAnnouncement() {
            const el = document.getElementById('announcement-text');
            if (announcements.length === 0) {
                el.textContent = "";
                return;
            }
            el.classList.add('fade-out');
            setTimeout(() => {
                el.textContent = announcements[announcementIndex];
                el.classList.remove('fade-out');
                announcementIndex = (announcementIndex + 1) % announcements.length;
            }, 500);
        }

        function renderTable() {
            if (paginationTimeout) clearTimeout(paginationTimeout);
            
            const container = document.querySelector('.table-container');
            const thead = document.querySelector('thead');
            const availableHeight = container.clientHeight - thead.offsetHeight;
            const dynamicRowsPerPage = Math.max(1, Math.floor(availableHeight / 80));

            const body = document.getElementById('schedule-body');
            body.innerHTML = '';
            
            const totalPages = Math.ceil(allRows.length / dynamicRowsPerPage);
            if (currentPage >= totalPages && totalPages > 0) currentPage = 0;

            const start = currentPage * dynamicRowsPerPage;
            const pageRows = allRows.slice(start, start + dynamicRowsPerPage);

            pageRows.forEach(row => {
                const tr = document.createElement('tr');
                tr.classList.add('row-fade-in');
                if (row.isReplacement) tr.classList.add('status-replacement');
                else if (row.statusClass === 'current') tr.classList.add('status-current');
                else if (row.statusClass === 'upcoming') tr.classList.add('status-upcoming');
                
                let teacherHtml = `<div class="teacher-cell-wrapper">${SVG_USER}<span>${row.teacher}</span></div>`;
                if (row.isReplacement) {
                    teacherHtml = `<div class="teacher-replacement teacher-cell-wrapper">${SVG_USER}<div class="teacher-replacement"><span class="original">${row.originalTeacher}</span><span class="new">${row.teacher}</span></div></div>`;
                }

                let sIcon = SVG_CHECK, sClass = 'normal', sText = 'Все ок';
                if (row.statusClass === 'current') { sIcon = SVG_CLOCK; sClass = 'current'; sText = 'Зараз'; }
                else if (row.statusClass === 'upcoming') { sIcon = SVG_CLOCK; sClass = 'upcoming'; sText = 'Скоро'; }
                else if (row.isReplacement) { sIcon = SVG_ALERT; sClass = 'replacement'; sText = 'Заміна'; }

                tr.innerHTML = `<td><b>${row.className}</b></td><td>${row.lessonNumber}</td><td>${row.subject}</td><td>${teacherHtml}</td><td>${row.room}</td><td><div class="status-badge ${sClass}">${sIcon}<span>${sText}</span></div></td>`;
                body.appendChild(tr);
            });

            if (allRows.length > dynamicRowsPerPage) {
                paginationTimeout = setTimeout(() => {
                    currentPage = (currentPage + 1) % totalPages;
                    renderTable();
                }, 10000);
            }
        }

        connectWS();
    </script>
</body>
</html>
