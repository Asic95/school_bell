<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Bell Dashboard - Modern Full</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-yellow: #f59e0b;
            --accent-red: #ef4444;
            --accent-purple: #6366f1;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.15) 0px, transparent 50%);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            height: 100px;
            padding: 0 40px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            z-index: 100;
        }

        .school-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .school-logo-small {
            height: 48px;
            width: auto;
            stroke: var(--accent-blue);
            stroke-width: 1.5;
            fill: none;
        }

        .school-brand h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(to right, #fff, var(--text-dim));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .header-center {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-time {
            font-size: 56px;
            font-weight: 900;
            color: white;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
        }

        .header-date {
            font-size: 14px;
            color: var(--accent-blue);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 5px;
        }

        .header-right {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 25px;
        }

        .system-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .system-badge span {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #conn-status {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 10px currentColor;
        }

        main {
            flex: 1;
            padding: 25px 40px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* TABLE SECTION */
        .table-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative; /* Base for absolute positioning if needed, or just layout */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        th {
            text-align: left;
            padding: 12px 25px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.2);
        }

        th .th-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        th svg {
            width: 20px;
            height: 20px;
            stroke: var(--accent-blue);
            stroke-width: 2.5;
            fill: none;
            flex-shrink: 0;
        }

        td {
            padding: 0 25px;
            font-size: 22px;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            height: 80px;
            overflow: hidden;
            vertical-align: middle;
        }

        td b {
            font-weight: 800;
            color: var(--accent-blue);
        }

        tr {
            height: 80px;
        }

        tr.row-fade-in {
            animation: slideRight 0.5s ease-out backwards;
        }

        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* ROW SPECIAL STYLES */
        tr.status-replacement {
            background: rgba(239, 68, 68, 0.05);
            border-left: 6px solid var(--accent-red);
        }

        tr.status-current {
            background: rgba(59, 130, 246, 0.08);
            border-left: 6px solid var(--accent-blue);
            box-shadow: inset 0 0 20px rgba(59, 130, 246, 0.1);
        }

        .teacher-replacement {
            display: flex;
            flex-direction: column;
            line-height: 1.2;
        }

        .teacher-replacement .original {
            text-decoration: line-through;
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 600;
        }

        .teacher-replacement .new {
            color: var(--accent-red);
            font-weight: 700;
        }

        /* COMPACT STATUS BAR */
        .compact-status-bar {
            height: 60px;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 40px;
            margin-top: auto; /* Push to bottom of the flex container */
        }

        .compact-item {
            display: flex;
            align-items: center;
            gap: 15px;
            white-space: nowrap;
        }

        .compact-label {
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--accent-blue);
            letter-spacing: 1px;
        }

        .compact-value {
            font-size: 20px;
            font-weight: 900;
            color: white;
            font-variant-numeric: tabular-nums;
        }

        .compact-progress-container {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .global-progress-bar {
            height: 100%;
            background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
            width: 0%;
            transition: width 1s linear;
        }

        /* FOOTER: ANNOUNCEMENTS */
        footer {
            height: 80px;
            margin: 0 40px 20px 40px;
            background: rgba(30, 41, 59, 0.6);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            padding: 0 30px;
            overflow: hidden;
            position: relative;
        }

        .announcement-tag {
            background: var(--accent-purple);
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 800;
            font-size: 13px;
            text-transform: uppercase;
            margin-right: 25px;
            white-space: nowrap;
            z-index: 10;
        }

        .announcement-content {
            flex: 1;
            font-size: 24px;
            font-weight: 600;
            overflow: hidden;
            display: flex;
            align-items: center;
            height: 100%;
        }

        #announcement-text {
            transition: opacity 0.5s ease-in-out;
            opacity: 1;
            white-space: normal;
        }

        #announcement-text.fade-out {
            opacity: 0;
        }

        /* EMERGENCY OVERLAY */
        #emergency-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(239, 68, 68, 0.95);
            text-align: center;
            backdrop-filter: blur(20px);
        }

        .em-title { font-size: 100px; font-weight: 900; color: white; margin-bottom: 20px; }
        .em-desc { font-size: 40px; font-weight: 700; color: white; opacity: 0.9; }

        /* Status badge styles from modern */
        .status-badge {
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        .status-badge.current { background: var(--accent-blue); color: white; }
        .status-badge.upcoming { background: rgba(245, 158, 11, 0.2); color: var(--accent-yellow); border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-badge.replacement { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); border: 1px solid rgba(239, 68, 68, 0.3); }
        .status-badge.normal { background: rgba(16, 185, 129, 0.2); color: var(--accent-green); border: 1px solid rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body>
    <header>
        <div class="school-brand">
            <svg class="school-logo-small" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>
            <h1 id="school-name">Школа</h1>
        </div>
        
        <div class="header-center">
            <div class="header-time" id="clock">00:00</div>
            <div class="header-date" id="header-date">-- --- ----</div>
        </div>

        <div class="header-right">
            <div class="system-badge">
                <div id="conn-status" style="background: #ef4444; color: #ef4444;"></div>
                <span>Система активна</span>
            </div>
        </div>
    </header>

    <main>
        <div class="table-section">
            <table>
                <thead>
                    <tr>
                        <th style="width: 10%"><div class="th-content"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg> Клас</div></th>
                        <th style="width: 25%"><div class="th-content"><svg viewBox="0 0 24 24"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg> Предмет</div></th>
                        <th style="width: 40%"><div class="th-content"><svg viewBox="0 0 24 24"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg> Вчитель</div></th>
                        <th style="width: 10%"><div class="th-content"><svg viewBox="0 0 24 24"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg> Каб.</div></th>
                        <th style="width: 15%"><div class="th-content"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> Статус</div></th>
                    </tr>
                </thead>
                <tbody id="schedule-body"></tbody>
            </table>

            <div class="compact-status-bar">
                <div class="compact-item">
                    <span class="compact-label" id="countdown-label">До дзвінка</span>
                    <span class="compact-value" id="countdown-text">--:--</span>
                </div>
                <div class="compact-progress-container">
                    <div class="global-progress-bar" id="global-progress-bar"></div>
                </div>
                <div class="compact-item">
                    <span class="compact-label">Статус:</span>
                    <span class="compact-value" id="global-status-title">Завантаження...</span>
                    <span class="compact-value" id="global-status-time" style="font-size: 14px; opacity: 0.7;">--:-- – --:--</span>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="announcement-tag">Оголошення</div>
        <div class="announcement-content">
            <div id="announcement-text">Вітаємо у системі School Bell!</div>
        </div>
    </footer>

    <div id="emergency-overlay">
        <h1 class="em-title" id="em-title">УВАГА</h1>
        <p class="em-desc" id="em-desc">Дотримуйтесь інструкцій</p>
    </div>

    <script>
        let socket;
        let currentPage = 0;
        let allRows = [];
        let paginationTimeout = null;

        let announcements = [];
        let announcementIndex = 0;
        let announcementTimer = null;

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit', hour12: false });
            document.getElementById('header-date').textContent = now.toLocaleDateString('uk-UA', { day: 'numeric', month: 'long' });
        }

        // --- Screen Wake Lock implementation ---
        let wakeLock = null;
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock active');
                    wakeLock.addEventListener('release', () => {
                        console.log('Wake Lock released');
                    });
                }
            } catch (err) {
                console.error(`${err.name}, ${err.message}`);
            }
        }
        
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                await requestWakeLock();
            }
        });
        requestWakeLock();
        // ----------------------------------------

        setInterval(updateClock, 1000);
        updateClock();

        function connectWS() {
            const currentPort = parseInt(window.location.port) || 80;
            const wsPort = currentPort + 2;
            const wsUrl = `ws://${window.location.hostname}:${wsPort}`;
            socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                const status = document.getElementById('conn-status');
                status.style.background = '#10b981';
                status.style.color = '#10b981';
                status.parentElement.querySelector('span').textContent = 'Система активна';
            };

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleUpdate(data);
            };

            socket.onclose = () => {
                const status = document.getElementById('conn-status');
                status.style.background = '#ef4444';
                status.style.color = '#ef4444';
                status.parentElement.querySelector('span').textContent = 'Система неактивна';
                setTimeout(connectWS, 5000);
            };
        }

        function handleUpdate(data) {
            if (data.schoolName) document.getElementById('school-name').textContent = data.schoolName;
            
            if (data.announcement !== undefined) {
                const raw = data.announcement || "Вітаємо у системі School Bell!";
                const newAnnouncements = raw.split('|||').filter(s => s.trim().length > 0);
                
                if (JSON.stringify(newAnnouncements) !== JSON.stringify(announcements)) {
                    announcements = newAnnouncements;
                    announcementIndex = 0;
                    startAnnouncementRotation();
                }
            }
            
            const overlay = document.getElementById('emergency-overlay');
            const alert = data.alertType;
            if (alert && alert !== 'NONE') {
                overlay.style.display = 'flex';
                overlay.className = alert.toLowerCase();
                document.getElementById('em-title').textContent = alert === 'AIR_RAID' ? 'ПОВІТРЯНА ТРИВОГА' : 
                                                                alert === 'SILENCE' ? 'ХВИЛИНА МОВЧАННЯ' : 'УВАГА';
                document.getElementById('em-desc').textContent = alert === 'SILENCE' ? 'ВШАНУЙМО ПАМ’ЯТЬ ЗАГИБЛИХ ГЕРОЇВ' : 'ДОТРИМУЙТЕСЬ ІНСТРУКЦІЙ';
            } else {
                overlay.style.display = 'none';
            }

            if (data.schoolStatus) {
                const s = data.schoolStatus;
                document.getElementById('global-status-title').textContent = s.title.toUpperCase();
                document.getElementById('global-status-time').textContent = `${s.start} – ${s.end}`;
                document.getElementById('global-progress-bar').style.width = (s.progress || 0) + '%';
                
                const label = document.getElementById('countdown-label');
                label.textContent = (s.type === 'BREAK' || s.type === 'BEFORE') ? 'До уроку' : 'До дзвінка';
            }

            if (data.rows) {
                const newData = JSON.stringify(data.rows);
                if (window.lastRowsData !== newData) {
                    window.lastRowsData = newData;
                    allRows = data.rows;
                    renderTable();
                }
            }

            if (data.countdown) {
                document.getElementById('countdown-text').textContent = data.countdown;
            }
        }

        function startAnnouncementRotation() {
            if (announcementTimer) clearInterval(announcementTimer);
            showNextAnnouncement();
            if (announcements.length > 1) {
                announcementTimer = setInterval(showNextAnnouncement, 8000);
            }
        }

        function showNextAnnouncement() {
            const el = document.getElementById('announcement-text');
            if (announcements.length === 0) {
                el.textContent = "";
                return;
            }
            el.classList.add('fade-out');
            setTimeout(() => {
                el.textContent = announcements[announcementIndex];
                el.classList.remove('fade-out');
                announcementIndex = (announcementIndex + 1) % announcements.length;
            }, 500);
        }

        function renderTable() {
            if (paginationTimeout) clearTimeout(paginationTimeout);
            
            const container = document.querySelector('.table-section');
            const thead = document.querySelector('thead');
            const statusBar = document.querySelector('.compact-status-bar');
            const availableHeight = container.clientHeight - thead.offsetHeight - statusBar.offsetHeight;
            const dynamicRowsPerPage = Math.max(1, Math.floor(availableHeight / 80));

            const body = document.getElementById('schedule-body');
            body.innerHTML = '';
            
            const totalPages = Math.ceil(allRows.length / dynamicRowsPerPage);
            if (currentPage >= totalPages && totalPages > 0) currentPage = 0;

            const start = currentPage * dynamicRowsPerPage;
            const pageRows = allRows.slice(start, start + dynamicRowsPerPage);

            const statusIcons = {
                current: '<svg style="width:20px;height:20px" viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2" fill="currentColor"/></svg>',
                upcoming: '<svg style="width:20px;height:20px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
                replacement: '<svg style="width:20px;height:20px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>',
                normal: '<svg style="width:20px;height:20px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
            };

            pageRows.forEach((row, i) => {
                const tr = document.createElement('tr');
                tr.classList.add('row-fade-in');
                tr.style.animationDelay = `${i * 0.05}s`;
                if (row.isReplacement) tr.classList.add('status-replacement');
                if (row.statusClass === 'current') tr.classList.add('status-current');
                
                let sClass = row.statusClass || 'normal';
                let sText = sClass === 'current' ? 'Зараз' : sClass === 'upcoming' ? 'Скоро' : row.isReplacement ? 'Заміна' : 'Ок';
                let iconKey = sClass;
                if (row.isReplacement && sClass !== 'current') iconKey = 'replacement';
                let sIcon = statusIcons[iconKey] || statusIcons.normal;

                let teacherHtml = `<span>${row.teacher}</span>`;
                if (row.isReplacement) {
                    teacherHtml = `<div class="teacher-replacement"><span class="original">${row.originalTeacher}</span><span class="new">${row.teacher}</span></div>`;
                }

                tr.innerHTML = `
                    <td><b>${row.className}</b></td>
                    <td>${row.subject}</td>
                    <td>${teacherHtml}</td>
                    <td>${row.room}</td>
                    <td><span class="status-badge ${sClass}">${sIcon} ${sText}</span></td>
                `;
                body.appendChild(tr);
            });

            if (allRows.length > dynamicRowsPerPage) {
                paginationTimeout = setTimeout(() => {
                    currentPage = (currentPage + 1) % totalPages;
                    renderTable();
                }, 10000);
            }
        }

        connectWS();
    </script>
</body>
</html>
